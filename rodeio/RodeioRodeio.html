<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
  <title>Rodeo Rodeio — Gestión Ganadera</title>
  <meta name="theme-color" content="#0f1a12"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Rodeio"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0f1a12;font-family:system-ui,sans-serif}
    #pwa-banner{display:none;position:fixed;bottom:16px;left:50%;
      transform:translateX(-50%);background:#2d5c32;color:#7ec87f;
      padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;
      box-shadow:0 4px 20px #0008;z-index:9999;cursor:pointer;
      border:1px solid #4a8a50;white-space:nowrap}
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="pwa-banner">📲 Instalar app en el celular</div>
  <script>
    var deferredPrompt;
    window.addEventListener('beforeinstallprompt',function(e){
      e.preventDefault();deferredPrompt=e;
      var b=document.getElementById('pwa-banner');
      b.style.display='block';
      b.onclick=function(){b.style.display='none';deferredPrompt.prompt();deferredPrompt=null;};
    });
    window.addEventListener('appinstalled',function(){
      document.getElementById('pwa-banner').style.display='none';
    });
  </script>
