<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Rodeo Rodeio — Gestión Ganadera</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f1a12" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Rodeio" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #0f1a12; }
      #pwa-banner {
        display: none;
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        background: #2d5c32;
        color: #7ec87f;
        padding: 10px 18px;
        border-radius: 20px;
        font-family: system-ui, sans-serif;
        font-size: 13px;
        font-weight: 600;
        box-shadow: 0 4px 20px #0008;
        z-index: 9999;
        cursor: pointer;
        border: 1px solid #4a8a50;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="pwa-banner">📲 Instalar app en el celular</div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[PWA] SW registrado:', reg.scope))
            .catch(err => console.log('[PWA] SW error:', err));
        });
      }
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault();
        deferredPrompt = e;
        const banner = document.getElementById('pwa-banner');
        banner.style.display = 'block';
        banner.addEventListener('click', () => {
          banner.style.display = 'none';
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
        });
      });
      window.addEventListener('appinstalled', () => {
        document.getElementById('pwa-banner').style.display = 'none';
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
